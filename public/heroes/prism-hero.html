<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engenium Labs — Prism Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --roman-dusk: #171210;
    --warm-linen: #F5EFE0;
    --aged-clay: #A86040;
    --verdigris: #507E78;
    --roman-dusk-rgb: 23, 18, 16;
    --warm-linen-rgb: 245, 239, 224;
    --aged-clay-rgb: 168, 96, 64;
    --verdigris-rgb: 80, 126, 120;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  body {
    background: #0c0a08;
    color: var(--warm-linen);
  }

  /* ═══════════════════════════════════════
     GRAIN — on top of everything
     ═══════════════════════════════════════ */
  .grain-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    opacity: 0.22;
    mix-blend-mode: overlay;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 160px 160px;
  }

  /* ═══════════════════════════════════════
     NIGHTY NIGHT BACKGROUND
     ═══════════════════════════════════════ */
  .bg-nighty {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-nighty .plane {
    position: absolute;
    width: 200%; height: 200%;
    top: -20%; left: -50%;
    background: linear-gradient(
      -60deg,
      rgba(var(--verdigris-rgb), 0.12) 0%,
      rgba(var(--roman-dusk-rgb), 0.6) 35%,
      rgba(var(--aged-clay-rgb), 0.08) 55%,
      rgba(var(--roman-dusk-rgb), 0.9) 100%
    );
    transform: perspective(800px) rotateX(55deg);
    transform-origin: center center;
    animation: nightDrift 18s ease-in-out infinite alternate;
  }

  .bg-nighty .horizon-glow {
    position: absolute;
    bottom: 40%; left: 0; right: 0; height: 30%;
    background: radial-gradient(
      ellipse 120% 80% at 50% 100%,
      rgba(var(--aged-clay-rgb), 0.06) 0%,
      transparent 70%
    );
  }

  @keyframes nightDrift {
    0%   { transform: perspective(800px) rotateX(55deg) translateX(-2%); }
    100% { transform: perspective(800px) rotateX(55deg) translateX(2%); }
  }

  /* ═══════════════════════════════════════
     PRISM — WebGL canvas
     ═══════════════════════════════════════ */
  .prism-wrapper {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #prismCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    opacity: 0;
    animation: prismFadeIn 2.5s ease-out 0.3s forwards;
    mix-blend-mode: screen;
  }

  @keyframes prismFadeIn {
    from { opacity: 0; }
    to   { opacity: 0.85; }
  }

  /* ═══════════════════════════════════════
     COPY OVERLAY
     ═══════════════════════════════════════ */
  .copy-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 0 6vw 8vh;
    pointer-events: none;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--verdigris);
    margin-bottom: 1.6rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.4s forwards;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.6rem, 5.5vw, 5rem);
    line-height: 1.15;
    text-align: center;
    letter-spacing: -0.01em;
    max-width: 20ch;
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 0.7s forwards;
  }

  .headline em {
    font-style: italic;
    color: var(--aged-clay);
  }

  .headline .verd {
    color: var(--verdigris);
    font-style: italic;
  }

  .subline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 1.3vw, 1.15rem);
    line-height: 1.6;
    text-align: center;
    letter-spacing: 0.03em;
    color: rgba(var(--warm-linen-rgb), 0.55);
    max-width: 42ch;
    opacity: 0;
    animation: fadeUp 1s ease-out 1.2s forwards;
  }

  .cta-row {
    display: flex;
    gap: 1.2rem;
    margin-top: 2.4rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 1.6s forwards;
    pointer-events: auto;
  }

  .cta-primary {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--roman-dusk);
    background: var(--warm-linen);
    border: none;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .cta-primary:hover {
    background: var(--aged-clay);
    color: var(--warm-linen);
  }

  .cta-secondary {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(var(--warm-linen-rgb), 0.55);
    background: transparent;
    border: 1px solid rgba(var(--warm-linen-rgb), 0.15);
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: border-color 0.3s ease, color 0.3s ease;
  }

  .cta-secondary:hover {
    border-color: var(--verdigris);
    color: var(--verdigris);
  }

  /* ═══════════════════════════════════════
     CORNER LABEL
     ═══════════════════════════════════════ */
  .corner-label {
    position: fixed;
    top: 3rem; right: 4vw;
    z-index: 60;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(var(--warm-linen-rgb), 0.35);
    opacity: 0;
    animation: fadeUp 1s ease-out 2s forwards;
  }

  /* ═══════════════════════════════════════
     NAV MARK
     ═══════════════════════════════════════ */
  .nav-mark {
    position: fixed;
    top: 3rem; left: 4vw;
    z-index: 60;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--warm-linen);
    opacity: 0;
    animation: fadeUp 1s ease-out 0.2s forwards;
  }

  .nav-mark span {
    font-weight: 300;
    color: rgba(var(--warm-linen-rgb), 0.4);
    margin-left: 0.3em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-nighty">
  <div class="plane"></div>
  <div class="horizon-glow"></div>
</div>

<!-- Prism WebGL -->
<div class="prism-wrapper">
  <canvas id="prismCanvas"></canvas>
</div>

<!-- Grain -->
<div class="grain-overlay"></div>

<!-- Corner label -->
<div class="corner-label">Engenium Labs · Austin, TX</div>

<!-- Nav mark -->
<div class="nav-mark">Engenium<span>Labs</span></div>

<!-- Copy -->
<div class="copy-overlay">
  <div class="eyebrow">Real people · Real names · Real work</div>
  <h1 class="headline">
    Three people.<br><em>Real names.</em><br>We answer the <span class="verd">phone.</span>
  </h1>
  <p class="subline">
    Matt, James, and Christina. No offshore team, no subcontractors, no handoff to a junior you've never met. You talk to the people doing the work.
  </p>
  <div class="cta-row">
    <button class="cta-primary">Start a conversation</button>
    <button class="cta-secondary">See the work</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// PRISM — Pure WebGL (zero dependencies)
// Ported from React Bits Prism component
// ═══════════════════════════════════════
(function() {
  const canvas = document.getElementById('prismCanvas');
  if (!canvas) return;

  // --- Config (matches React Bits defaults) ---
  const H         = 3.5;
  const BW        = 5.5;
  const BASE_HALF = BW * 0.5;
  const GLOW      = 0.55;
  const NOISE     = 0.0;
  const SCALE     = 3.6;
  const HUE       = 0.0;
  const CFREQ     = 0.45;
  const BLOOM     = 0.6;
  const TS        = 0.5;
  const SAT       = 0.35;

  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const gl = canvas.getContext('webgl', { alpha: true, antialias: false, premultipliedAlpha: false });
  if (!gl) return;

  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  gl.disable(gl.BLEND);

  // --- Compile shader helper ---
  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      gl.deleteShader(s);
      return null;
    }
    return s;
  }

  // --- Vertex shader (fullscreen triangle) ---
  const vsSrc = `
    attribute vec2 position;
    void main() {
      gl_Position = vec4(position, 0.0, 1.0);
    }
  `;

  // --- Fragment shader (the Prism effect) ---
  const fsSrc = `
    precision highp float;

    uniform vec2  iResolution;
    uniform float iTime;
    uniform float uHeight;
    uniform float uBaseHalf;
    uniform mat3  uRot;
    uniform int   uUseBaseWobble;
    uniform float uGlow;
    uniform vec2  uOffsetPx;
    uniform float uNoise;
    uniform float uSaturation;
    uniform float uScale;
    uniform float uHueShift;
    uniform float uColorFreq;
    uniform float uBloom;
    uniform float uCenterShift;
    uniform float uInvBaseHalf;
    uniform float uInvHeight;
    uniform float uMinAxis;
    uniform float uPxScale;
    uniform float uTimeScale;
    vec4 tanh4(vec4 x){
      vec4 e2x = exp(2.0*x);
      return (e2x - 1.0) / (e2x + 1.0);
    }

    float rand(vec2 co){
      return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453123);
    }

    float sdOctaAnisoInv(vec3 p){
      vec3 q = vec3(abs(p.x) * uInvBaseHalf, abs(p.y) * uInvHeight, abs(p.z) * uInvBaseHalf);
      float m = q.x + q.y + q.z - 1.0;
      return m * uMinAxis * 0.5773502691896258;
    }

    float sdPyramidUpInv(vec3 p){
      float oct = sdOctaAnisoInv(p);
      float halfSpace = -p.y;
      return max(oct, halfSpace);
    }

    mat3 hueRotation(float a){
      float c = cos(a), s = sin(a);
      mat3 W = mat3(
        0.299, 0.587, 0.114,
        0.299, 0.587, 0.114,
        0.299, 0.587, 0.114
      );
      mat3 U = mat3(
         0.701, -0.587, -0.114,
        -0.299,  0.413, -0.114,
        -0.300, -0.588,  0.886
      );
      mat3 V = mat3(
         0.168, -0.331,  0.500,
         0.328,  0.035, -0.500,
        -0.497,  0.296,  0.201
      );
      return W + U * c + V * s;
    }

    void main(){
      vec2 f = (gl_FragCoord.xy - 0.5 * iResolution.xy - uOffsetPx) * uPxScale;

      float z = 5.0;
      float d = 0.0;
      vec3 p;
      vec4 o = vec4(0.0);

      float centerShift = uCenterShift;
      float cf = uColorFreq;

      mat2 wob = mat2(1.0);
      if (uUseBaseWobble == 1) {
        float t = iTime * uTimeScale;
        float c0 = cos(t + 0.0);
        float c1 = cos(t + 33.0);
        float c2 = cos(t + 11.0);
        wob = mat2(c0, c1, c2, c0);
      }

      const int STEPS = 100;
      for (int i = 0; i < STEPS; i++) {
        p = vec3(f, z);
        p.xz = p.xz * wob;
        p = uRot * p;
        vec3 q = p;
        q.y += centerShift;
        d = 0.1 + 0.2 * abs(sdPyramidUpInv(q));
        z -= d;
        o += (sin((p.y + z) * cf + vec4(0.0, 1.0, 2.0, 3.0)) + 1.0) / d;
      }

      o = tanh4(o * o * (uGlow * uBloom) / 1e5);

      vec3 col = o.rgb;
      float n = rand(gl_FragCoord.xy + vec2(iTime));
      col += (n - 0.5) * uNoise;
      col = clamp(col, 0.0, 1.0);

      float L = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = clamp(mix(vec3(L), col, uSaturation), 0.0, 1.0);

      if(abs(uHueShift) > 0.0001){
        col = clamp(hueRotation(uHueShift) * col, 0.0, 1.0);
      }

      gl_FragColor = vec4(col, o.a);
    }
  `;

  // --- Build program ---
  const vs = compile(gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
    return;
  }
  gl.useProgram(prog);

  // --- Fullscreen triangle (covers viewport with one triangle, no seam) ---
  // Vertices: (-1,-1), (3,-1), (-1,3) — oversized triangle clipped to viewport
  const posBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(prog, 'position');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // --- Get uniform locations ---
  const u = {};
  const uNames = [
    'iResolution','iTime','uHeight','uBaseHalf','uRot','uUseBaseWobble',
    'uGlow','uOffsetPx','uNoise','uSaturation','uScale','uHueShift',
    'uColorFreq','uBloom','uCenterShift','uInvBaseHalf','uInvHeight',
    'uMinAxis','uPxScale','uTimeScale'
  ];
  uNames.forEach(n => u[n] = gl.getUniformLocation(prog, n));

  // --- Set static uniforms ---
  gl.uniform1f(u.uHeight, H);
  gl.uniform1f(u.uBaseHalf, BASE_HALF);
  gl.uniform1i(u.uUseBaseWobble, 1);
  gl.uniformMatrix3fv(u.uRot, false, [1,0,0, 0,1,0, 0,0,1]);
  gl.uniform1f(u.uGlow, GLOW);
  gl.uniform2f(u.uOffsetPx, 0, 0);
  gl.uniform1f(u.uNoise, NOISE);
  gl.uniform1f(u.uSaturation, SAT);
  gl.uniform1f(u.uScale, SCALE);
  gl.uniform1f(u.uHueShift, HUE);
  gl.uniform1f(u.uColorFreq, CFREQ);
  gl.uniform1f(u.uBloom, BLOOM);
  gl.uniform1f(u.uCenterShift, H * 0.25);
  gl.uniform1f(u.uInvBaseHalf, 1.0 / BASE_HALF);
  gl.uniform1f(u.uInvHeight, 1.0 / H);
  gl.uniform1f(u.uMinAxis, Math.min(BASE_HALF, H));
  gl.uniform1f(u.uTimeScale, TS);

  // --- Resize handler ---
  function resize() {
    const w = canvas.parentElement.clientWidth  || window.innerWidth;
    const h = canvas.parentElement.clientHeight || window.innerHeight;
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(u.iResolution, canvas.width, canvas.height);
    gl.uniform1f(u.uPxScale, 1.0 / (canvas.height * 0.1 * SCALE));
  }

  const ro = new ResizeObserver(resize);
  ro.observe(canvas.parentElement);
  resize();

  // --- Render loop ---
  const t0 = performance.now();

  function render(ts) {
    const time = (ts - t0) * 0.001;
    gl.uniform1f(u.iTime, time);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
